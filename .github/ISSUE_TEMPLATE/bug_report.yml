name: Bug Report
description: Report a bug in the frontend
title: "[Bug]: "
labels: ["bug", "triage"]
projects: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: dropdown
    id: topic
    attributes:
      label: Topic / Area
      description: Which part of the application is affected?
      options:
        - Matterport 3D Visualization
        - Task Management
        - Document Management
        - Notifications
        - Authentication (Clerk)
        - Calendar
        - Dashboard
        - Navigation / Menu
        - UI / Layout
        - API / Data Fetching
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect?
      placeholder: Describe the bug as precisely as possible
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can the bug be reproduced?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Error appears
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (application unusable)
        - High (important feature broken)
        - Medium (workaround available)
        - Low (cosmetic / minor)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Version
      placeholder: e.g. Chrome 122, Firefox 123

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, error messages, logs, etc.
