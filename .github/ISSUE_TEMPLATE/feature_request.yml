name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-discussion"]
projects: []
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your suggestion!

  - type: dropdown
    id: topic
    attributes:
      label: Topic / Area
      description: Which area should this feature be assigned to?
      options:
        - Matterport 3D Visualization
        - Task Management
        - Document Management
        - Notifications
        - Authentication
        - Calendar
        - Dashboard
        - Navigation / Menu
        - Performance
        - UI / UX
        - API Integration
        - New Area
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem should this feature solve?
      placeholder: As a user I want..., because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Desired Solution
      description: How do you envision the solution?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Are there alternative approaches you have considered?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Must-have (MVP)
        - Should have
        - Nice-to-have
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      options:
        - Small (< 1 day)
        - Medium (1-3 days)
        - Large (1 week)
        - Very large (> 1 week)

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, references, further information
