name: Task
description: Development task or refactoring
title: "[Task]: "
labels: ["task"]
projects: []
assignees: []

body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic / Sprint Area
      options:
        - Matterport 3D Visualization
        - Task Management
        - Document Management
        - Notifications
        - Authentication
        - Calendar
        - Dashboard
        - Refactoring / Code Quality
        - Testing
        - DevOps / CI/CD
        - Performance
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: When is the task considered done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: story_points
    attributes:
      label: Story Points (optional)
      placeholder: e.g. 3
