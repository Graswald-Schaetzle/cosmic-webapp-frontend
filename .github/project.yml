# GitHub Project Board - Configuration
# Cosmic WebApp Frontend
#
# Instructions to create the project board:
# 1. Go to https://github.com/Graswald-Schaetzle/cosmic-webapp-frontend
# 2. Click "Projects" > "New project"
# 3. Choose "Board" as template
# 4. Name the project: "Cosmic Frontend – Development Roadmap"
# 5. Add columns according to this configuration

name: "Cosmic Frontend – Development Roadmap"
description: >
  Topic-driven project board for Cosmic WebApp frontend development.
  Issues are filtered and prioritized by topic labels.

# ─── Board Columns ───────────────────────────────────────────────────────────
columns:
  - name: "Backlog"
    description: All open, not yet prioritized tasks
    filter: "is:open label:\"status: backlog\""

  - name: "Ready"
    description: Prioritized tasks ready to be worked on
    filter: "is:open label:\"status: ready\""

  - name: "In Progress"
    description: Currently in development
    filter: "is:open label:\"status: in-progress\""

  - name: "Review / QA"
    description: Waiting for code review or testing
    filter: "is:open label:\"status: review\""

  - name: "Done"
    description: Completed tasks
    filter: "is:closed"

# ─── Topic Views (for board filtering) ───────────────────────────────────────
topic_views:
  - name: "Matterport 3D"
    filter: "label:\"topic: matterport\""

  - name: "Task Management"
    filter: "label:\"topic: tasks\""

  - name: "Document Management"
    filter: "label:\"topic: documents\""

  - name: "Notifications"
    filter: "label:\"topic: notifications\""

  - name: "Auth & Security"
    filter: "label:\"topic: auth\""

  - name: "UI / UX"
    filter: "label:\"topic: ui-ux\""

  - name: "DevOps"
    filter: "label:\"topic: devops\""
